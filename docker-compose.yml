services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: alertapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: alertapp
      POSTGRES_USER: alertapp
      POSTGRES_PASSWORD: alertapp_dev_password
    ports:
      - "5432:5432"
    volumes:
      - alertapp_postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alertapp -d alertapp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  alertapp_postgres_data:
