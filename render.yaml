services:
  - type: web
    name: alertapp-api
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build --workspace backend
    preDeployCommand: npm run db:migrate:prod --workspace backend && npm run db:seed:prod --workspace backend
    startCommand: npm run start --workspace backend
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: alertapp-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: APP_PUBLIC_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: AUTH_TOKEN_PEPPER
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: none
      - key: ACCESS_TOKEN_EXPIRES_IN_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRES_DAYS
        value: "7"
      - key: MAIL_PROVIDER
        value: resend
      - key: MAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EVIDENCE_STORAGE_PROVIDER
        value: cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MAX_EVIDENCE_SIZE_MB
        value: "5"
      - key: MAX_EVIDENCES_PER_REPORT
        value: "3"
      - key: EXPOSE_DEV_TOKENS
        value: "false"
      - key: SEED_DEMO_DATA
        value: "false"
      - key: INITIAL_ADMIN_EMAIL
        sync: false
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
  - type: web
    name: alertapp-web
    runtime: static
    buildCommand: npm ci && npm run build --workspace frontend
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
      - key: VITE_MAP_TILE_URL
        value: https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png
      - key: VITE_MAP_ATTRIBUTION
        value: © OpenStreetMap contributors
      - key: VITE_APP_ENV
        value: production
databases:
  - name: alertapp-db
    databaseName: alertapp
    user: alertapp
    plan: basic-256mb
