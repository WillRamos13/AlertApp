name: AlertApp CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: alertapp_test
          POSTGRES_USER: alertapp
          POSTGRES_PASSWORD: alertapp_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alertapp -d alertapp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Auditar dependencias de producción
        run: npm audit --omit=dev --audit-level=high
      - run: npm run build
      - run: npm test
